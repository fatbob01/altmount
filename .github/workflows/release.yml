name: Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # checkout
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/test
  build-frontend:
    runs-on: ubuntu-latest
    needs: test
    steps:
      # checkout
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install Bun for frontend build
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache frontend dependencies
      - name: Cache frontend dependencies
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: frontend-deps-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            frontend-deps-${{ runner.os }}-

      # Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      # Extract version info for frontend
      - name: Extract version info for frontend
        id: frontend-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            VERSION="${TAG#v}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          COMMIT=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT

      # Build frontend for embedding
      - name: Build frontend
        working-directory: frontend
        env:
          npm_package_version: ${{ steps.frontend-version.outputs.version }}
          GIT_COMMIT: ${{ steps.frontend-version.outputs.commit }}
        run: bun run build

      # Upload built frontend as artifact
      - name: Upload frontend build
        uses: actions/upload-artifact@v6
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 1

  prepare-release:
    runs-on: ubuntu-latest
    needs: [test, build-frontend]
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit: ${{ steps.version.outputs.commit }}
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version info
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            VERSION="${TAG#v}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          fi
          COMMIT=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Ensure GitHub Release exists with generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.release_tag }}
          GENERATE_NOTES: ${{ github.event_name != 'workflow_dispatch' }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
          else
            if [ "$GENERATE_NOTES" = "true" ]; then
              gh release create "$TAG" --title "$TAG" --generate-notes
            else
              gh release create "$TAG" --title "$TAG"
            fi
          fi

  build-cli:
    needs: [prepare-release, build-frontend]
    permissions:
      contents: write
    uses: ./.github/workflows/build-cli.yml
    with:
      version: ${{ needs.prepare-release.outputs.version }}
      commit: ${{ needs.prepare-release.outputs.commit }}
      upload-to-release: true
      release-tag: ${{ needs.prepare-release.outputs.release_tag }}
      prerelease: false
